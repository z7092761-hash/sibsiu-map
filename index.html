<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный кампус СибГИУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .building {
            transition: all 0.2s ease;
        }
        .building:hover {
            fill: #005fa3 !important;
            cursor: pointer;
        }
        .highlighted {
            fill: #ef4444 !important;
            stroke: #dc2626 !important;
            stroke-width: 3px !important;
        }
        #map {
            height: 450px;
            border-radius: 12px;
        }
    </style>
</head>
<body class="p-3 select-none flex flex-col h-screen justify-between">

    <div class="w-full max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-2 text-center" style="color: var(--tg-theme-link-color, #0082c8)">🏛️ Кампус СибГИУ</h1>
        <div class="flex gap-2 mb-3">
            <input id="search-input" type="text" placeholder="Поиск (например: 5, Столовая, Культурный)..." 
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                   style="background: var(--tg-theme-secondary-bg-color, #f3f4f6); border-color: var(--tg-theme-hint-color, #ccc); color: var(--tg-theme-text-color, #000)">
            <button onclick="searchBuilding()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">Найти</button>
        </div>

        <div class="flex justify-center gap-2 mb-3">
            <button onclick="switchMode('schema')" id="btn-schema" class="px-4 py-1.5 rounded-full font-semibold text-xs shadow-sm bg-blue-600 text-white">📊 Схема кампуса</button>
            <button onclick="switchMode('gps')" id="btn-gps" class="px-4 py-1.5 rounded-full font-semibold text-xs shadow-sm bg-gray-200 text-gray-700">🗺️ Реальная карта</button>
        </div>

        <div id="info-box" class="mb-3 p-3 rounded-lg text-sm hidden shadow-sm" style="background: var(--tg-theme-secondary-bg-color, #e5e7eb)">
            <div class="font-bold text-blue-700 text-base" id="info-title">Корпус</div>
            <div class="text-xs mt-1 text-gray-700 leading-relaxed" id="info-desc">Описание...</div>
            <div class="text-[10px] mt-1.5 text-red-500 font-semibold">* Переходы между учебными корпусами расположены на 2-ом этаже.</div>
        </div>
    </div>

    <div class="flex-grow w-full max-w-xl mx-auto flex items-center justify-center border rounded-xl p-2 shadow-inner bg-slate-50 overflow-hidden" style="border-color: var(--tg-theme-hint-color, #e5e7eb);">
        
        <div id="schema-view" class="w-full h-full flex items-center justify-center">
            <svg viewBox="0 0 500 550" class="w-full h-full max-h-[70vh]" xmlns="http://www.w3.org/2000/svg">
                
                <path d="M 270 330 L 195 260" stroke="#0082c8" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4" />
                <path d="M 270 330 L 195 260" stroke="#0082c8" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round" fill="none" />
                
                <path id="build-1" class="building" d="M 210 370 L 250 370 L 250 420 L 300 420 L 300 370 L 340 370 L 340 480 L 210 480 Z" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(1)"/>
                <text x="275" y="460" fill="#fff" font-size="16" font-weight="bold" class="pointer-events-none" text-anchor="middle">1</text>

                <rect id="build-3" class="building" x="255" y="290" width="40" height="80" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(3)"/>
                <text x="275" y="335" fill="#fff" font-size="15" font-weight="bold" class="pointer-events-none" text-anchor="middle">3</text>

                <rect x="340" y="400" width="40" height="15" fill="#0082c8" opacity="0.5" />
                <rect id="build-2" class="building" x="380" y="385" width="90" height="45" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(2)"/>
                <text x="425" y="412" fill="#fff" font-size="15" font-weight="bold" class="pointer-events-none" text-anchor="middle">2</text>


                <g transform="translate(160, 230) rotate(-42)">
                    
                    <rect x="-140" y="-6" width="420" height="12" fill="#0082c8" opacity="0.3" />

                    <rect id="build-9" class="building" x="-140" y="-22" width="55" height="44" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(9)"/>
                    <text x="-112" y="5" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(42, -112, 5)">9</text>

                    <rect x="-85" y="-4" width="20" height="8" fill="#0082c8" opacity="0.6"/>

                    <rect id="build-5" class="building" x="-65" y="-35" width="130" height="30" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(5)"/>
                    <text x="0" y="-15" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(42, 0, -15)">5</text>

                    <rect id="build-6" class="building" x="65" y="-35" width="160" height="30" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(6)"/>
                    <text x="145" y="-15" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(42, 145, -15)">6</text>

                    <rect id="build-4" class="building" x="-45" y="6" width="55" height="55" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(4)"/>
                    <text x="-17" y="38" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(42, -17, 38)">4</text>

                    <rect id="build-7" class="building" x="35" y="6" width="65" height="35" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(7)"/>
                    <text x="67" y="27" fill="#fff" font-size="13" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(42, 67, 27)">7</text>

                    <rect id="build-8" class="building" x="110" y="-80" width="65" height="35" fill="#0082c8" stroke="#0066a4" stroke-width="2" onclick="selectBuilding(8)"/>
                    <text x="142" y="-58" fill="#fff" font-size="13" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(42, 142, -58)">8</text>
                </g>
            </svg>
        </div>

        <div id="gps-view" class="w-full h-full hidden">
            <div id="map" class="w-full h-full"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const campusData = {
            1: { title: "1. Главный корпус", desc: "Ректорат, приемная комиссия, главный вход, бухгалтерия, библиотека, коворкинг и администрация университета.", coords: [53.75620, 87.12740] },
            2: { title: "2. Спорткомплекс", desc: "Спортивные залы, фитнес-зоны, кафедры физического воспитания, секции и проведение соревнований.", coords: [53.75630, 87.12870] },
            3: { title: "3. Столовая", desc: "Основной комбинат питания студентов, буфеты и обеденные зоны СибГИУ.", coords: [53.75660, 87.12750] },
            4: { title: "4. Блок поточных аудиторий", desc: "Большие лекционные амфитеатры для проведения потоковых занятий и общих лекций.", coords: [53.75680, 87.12650] },
            5: { title: "5. Металлургический корпус", desc: "Институт металлургии и материаловедения. Аудитории, научные лаборатории и учебные центры.", coords: [53.75710, 87.12580] },
            6: { title: "6. Горно-технологический корпус", desc: "Институт горного дела и геосистем, а также ИИТиАС (Информационные технологии и автоматизированные системы).", coords: [53.75770, 87.12670] },
            7: { title: "7. Блок тяжелых лабораторий 1", desc: "Лабораторные стенды симуляции проката, физики металлов и термической обработки.", coords: [53.75730, 87.12640] },
            8: { title: "8. Блок тяжелых лабораторий 2", desc: "Исследовательские комплексы кафедр горного дела, геодезии и вентиляции шахт.", coords: [53.75760, 87.12740] },
            9: { title: "9. Культурный центр", desc: "Актовый зал, студенческий клуб, репетиционные залы, творческие студии, проведение концертов.", coords: [53.75680, 87.12470] }
        };

        let mapInitialized = false;
        let map;

        function switchMode(mode) {
            document.querySelectorAll('.building').forEach(b => b.classList.remove('highlighted'));
            if (mode === 'schema') {
                document.getElementById('schema-view').classList.remove('hidden');
                document.getElementById('gps-view').classList.add('hidden');
                document.getElementById('btn-schema').className = "px-4 py-1.5 rounded-full font-semibold text-xs shadow-sm bg-blue-600 text-white";
                document.getElementById('btn-gps').className = "px-4 py-1.5 rounded-full font-semibold text-xs shadow-sm bg-gray-200 text-gray-700";
            } else {
                document.getElementById('schema-view').classList.add('hidden');
                document.getElementById('gps-view').classList.remove('hidden');
                document.getElementById('btn-gps').className = "px-4 py-1.5 rounded-full font-semibold text-xs shadow-sm bg-blue-600 text-white";
                document.getElementById('btn-schema').className = "px-4 py-1.5 rounded-full font-semibold text-xs shadow-sm bg-gray-200 text-gray-700";
                
                if (!mapInitialized) {
                    initMap();
                }
            }
        }

        function initMap() {
            // Точный центр СибГИУ по вашим координатам
            map = L.map('map').setView([53.756988, 87.128615], 17);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            Object.keys(campusData).forEach(id => {
                const data = campusData[id];
                L.marker(data.coords)
                    .addTo(map)
                    .bindPopup(`<b>${data.title}</b><br>${data.desc}`);
            });

            mapInitialized = true;
        }

        function selectBuilding(id) {
            document.querySelectorAll('.building').forEach(b => b.classList.remove('highlighted'));
            
            const buildingEl = document.getElementById('build-' + id);
            if (buildingEl) buildingEl.classList.add('highlighted');

            const infoBox = document.getElementById('info-box');
            document.getElementById('info-title').innerText = campusData[id].title;
            document.getElementById('info-desc').innerText = campusData[id].desc;
            infoBox.classList.remove('hidden');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function searchBuilding() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (!query) return;

            let foundId = null;
            Object.keys(campusData).forEach(id => {
                if (id === query || campusData[id].title.toLowerCase().includes(query) || campusData[id].desc.toLowerCase().includes(query)) {
                    foundId = id;
                }
            });

            if (foundId) {
                switchMode('schema');
                selectBuilding(foundId);
            } else {
                alert("Объект не найден. Введите номер корпуса (1-9) или название.");
            }
        }
    </script>
</body>
</html>
