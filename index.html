<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный кампус СибГИУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .building {
            transition: all 0.3s ease;
        }
        .building:hover {
            fill: #2563eb !important;
            cursor: pointer;
        }
        .highlighted {
            fill: #ef4444 !important;
            stroke: #b91c1c !important;
            stroke-width: 3px !important;
        }
        #map {
            height: 380px;
            border-radius: 12px;
        }
    </style>
</head>
<body class="p-4 select-none">

    <div class="mb-4">
        <h1 class="text-xl font-bold mb-2 text-center" style="color: var(--tg-theme-link-color, #2563eb)">🏛️ Кампус СибГИУ</h1>
        <div class="flex gap-2">
            <input id="search-input" type="text" placeholder="Поиск (например: Столовая, 5, Главный)..." 
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                   style="background: var(--tg-theme-secondary-bg-color, #f3f4f6); border-color: var(--tg-theme-hint-color, #ccc); color: var(--tg-theme-text-color, #000)">
            <button onclick="searchBuilding()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700">Найти</button>
        </div>
    </div>

    <div class="flex justify-center gap-2 mb-4">
        <button onclick="switchMode('schema')" id="btn-schema" class="px-4 py-1.5 rounded-full font-semibold text-sm shadow-sm bg-blue-600 text-white">📊 Схема кампуса</button>
        <button onclick="switchMode('gps')" id="btn-gps" class="px-4 py-1.5 rounded-full font-semibold text-sm shadow-sm bg-gray-200 text-gray-700">🗺️ Реальная карта</button>
    </div>

    <div id="info-box" class="mb-4 p-3 rounded-lg text-sm hidden" style="background: var(--tg-theme-secondary-bg-color, #e5e7eb)">
        <div class="font-bold text-blue-600 id-title" id="info-title">Корпус</div>
        <div class="text-xs mt-1 text-gray-600" id="info-desc">Описание корпуса...</div>
        <div class="text-[10px] mt-1 text-red-500 font-medium">* Переходы между учебными корпусами на 2 этаже.</div>
    </div>

    <div id="schema-view" class="border rounded-xl p-2 flex justify-center items-center overflow-auto shadow-inner bg-white" style="min-height: 380px;">
        <svg viewBox="0 0 500 500" class="w-full h-auto max-w-md" xmlns="http://www.w3.org/2000/svg">
            
            <path id="build-1" class="building" d="M 180 400 L 280 400 L 280 480 L 250 480 L 250 430 L 210 430 L 210 480 L 180 480 Z" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(1)"/>
            <text x="220" y="415" fill="#fff" font-size="12" font-weight="bold" class="pointer-events-none">1</text>

            <rect id="build-3" class="building" x="215" y="340" width="35" height="60" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(3)"/>
            <text x="229" y="375" fill="#fff" font-size="12" font-weight="bold" class="pointer-events-none">3</text>

            <rect id="build-2" class="building" x="310" y="400" width="70" height="35" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(2)"/>
            <text x="340" y="422" fill="#fff" font-size="12" font-weight="bold" class="pointer-events-none">2</text>

            <line x1="215" y1="360" x2="150" y2="330" stroke="#0369a1" stroke-width="4" stroke-dasharray="2 2" />

            <g transform="translate(80,80) rotate(-38)">
                
                <rect x="-10" y="100" width="340" height="12" fill="#cbd5e1" />

                <rect id="build-9" class="building" x="-50" y="80" width="40" height="50" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(9)"/>
                <text x="-32" y="110" fill="#fff" font-size="11" font-weight="bold" class="pointer-events-none">9</text>

                <rect id="build-5" class="building" x="0" y="100" width="140" height="35" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(5)"/>
                <text x="65" y="122" fill="#fff" font-size="12" font-weight="bold" class="pointer-events-none">5</text>

                <rect id="build-6" class="building" x="140" y="100" width="150" height="35" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(6)"/>
                <text x="210" y="122" fill="#fff" font-size="12" font-weight="bold" class="pointer-events-none">6</text>

                <rect id="build-4" class="building" x="30" y="135" width="55" height="50" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(4)"/>
                <text x="52" y="165" fill="#fff" font-size="12" font-weight="bold" class="pointer-events-none">4</text>

                <rect id="build-7" class="building" x="110" y="135" width="60" height="30" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(7)"/>
                <text x="135" y="155" fill="#fff" font-size="11" font-weight="bold" class="pointer-events-none">7</text>

                <rect id="build-8" class="building" x="190" y="55" width="60" height="30" fill="#0284c7" stroke="#0369a1" stroke-width="2" onclick="selectBuilding(8)"/>
                <text x="215" y="75" fill="#fff" font-size="11" font-weight="bold" class="pointer-events-none">8</text>
            </g>
        </svg>
    </div>

    <div id="gps-view" class="hidden">
        <div id="map"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // База данных корпусов согласно схеме
        const campusData = {
            1: { title: "1. Главный корпус", desc: "Ректорат, приемная комиссия, главный вход, бухгалтерия, библиотека и администрация университета.", coords: [53.75625, 87.12745] },
            2: { title: "2. Спорткомплекс", desc: "Спортивные залы, фитнес-зоны, кафедры физического воспитания, проведение соревнований.", coords: [53.75635, 87.12875] },
            3: { title: "3. Столовая", desc: "Основной комбинат питания студентов и преподавателей СибГИУ.", coords: [53.75665, 87.12755] },
            4: { title: "4. Блок поточных аудиторий", desc: "Большие лекционные амфитеатры для потоковых занятий нескольких групп одновременно.", coords: [53.75685, 87.12655] },
            5: { title: "5. Металлургический корпус", desc: "Институт металлургии и материаловедения. Аудитории и специализированные научно-образовательные центры.", coords: [53.75715, 87.12585] },
            6: { title: "6. Горно-технологический корпус", desc: "Институт горного дела и геосистем, а также ИИТиАС (Информационные технологии и автоматизированные системы).", coords: [53.75785, 87.12685] },
            7: { title: "7. Блок тяжелых лабораторий 1", desc: "Лаборатории симуляции проката, металловедения и термообработки металлов.", coords: [53.75735, 87.12655] },
            8: { title: "8. Блок тяжелых лабораторий 2", desc: "Исследовательские стенды кафедр горного дела и геодезического оборудования.", coords: [53.75765, 87.12755] },
            9: { title: "9. Культурный центр", desc: "Актовый зал, студенческий клуб, репетиционные зоны, проведение концертов и официальных мероприятий.", coords: [53.75685, 87.12485] }
        };

        let mapInitialized = false;
        let map;

        // Переключение вкладок Схема / Карта
        function switchMode(mode) {
            document.querySelectorAll('.building').forEach(b => b.classList.remove('highlighted'));
            if (mode === 'schema') {
                document.getElementById('schema-view').classList.remove('hidden');
                document.getElementById('gps-view').classList.add('hidden');
                document.getElementById('btn-schema').className = "px-4 py-1.5 rounded-full font-semibold text-sm shadow-sm bg-blue-600 text-white";
                document.getElementById('btn-gps').className = "px-4 py-1.5 rounded-full font-semibold text-sm shadow-sm bg-gray-200 text-gray-700";
            } else {
                document.getElementById('schema-view').classList.add('hidden');
                document.getElementById('gps-view').classList.remove('hidden');
                document.getElementById('btn-gps').className = "px-4 py-1.5 rounded-full font-semibold text-sm shadow-sm bg-blue-600 text-white";
                document.getElementById('btn-schema').className = "px-4 py-1.5 rounded-full font-semibold text-sm shadow-sm bg-gray-200 text-gray-700";
                
                // Ленивая инициализация карты Leaflet
                if (!mapInitialized) {
                    initMap();
                }
            }
        }

        // Инициализация карты Leaflet по вашим координатам
        function initMap() {
            // Центр СибГИУ по предоставленным координатам
            map = L.map('map').setView([53.756988, 87.128615], 17);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Расставляем маркеры для всех 9 объектов
            Object.keys(campusData).forEach(id => {
                const data = campusData[id];
                L.marker(data.coords)
                    .addTo(map)
                    .bindPopup(`<b>${data.title}</b><br>${data.desc}`);
            });

            mapInitialized = true;
        }

        // Выбор здания кликом на схеме
        function selectBuilding(id) {
            document.querySelectorAll('.building').forEach(b => b.classList.remove('highlighted'));
            
            const buildingEl = document.getElementById('build-' + id);
            if (buildingEl) {
                buildingEl.classList.add('highlighted');
            }

            const infoBox = document.getElementById('info-box');
            document.getElementById('info-title').innerText = campusData[id].title;
            document.getElementById('info-desc').innerText = campusData[id].desc;
            infoBox.classList.remove('hidden');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium'); // Виброотклик в Telegram
            }
        }

        // Поиск по названию или номеру корпуса
        function searchBuilding() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (!query) return;

            let foundId = null;

            // Ищем совпадение по номеру или тексту
            Object.keys(campusData).forEach(id => {
                if (id === query || campusData[id].title.toLowerCase().includes(query) || campusData[id].desc.toLowerCase().includes(query)) {
                    foundId = id;
                }
            });

            if (foundId) {
                switchMode('schema');
                selectBuilding(foundId);
            } else {
                alert("Корпус не найден. Введите номер от 1 до 9 или название (например: Столовая, Спорткомплекс)");
            }
        }
    </script>
</body>
</html>
