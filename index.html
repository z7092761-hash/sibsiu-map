<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный кампус СибГИУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .building {
            transition: all 0.2s ease;
        }
        .building:hover {
            fill: #005fa3 !important;
            cursor: pointer;
        }
        .highlighted {
            fill: #ef4444 !important;
            stroke: #dc2626 !important;
            stroke-width: 3px !important;
        }
    </style>
</head>
<body class="p-3 select-none flex flex-col h-screen justify-between">

    <div class="w-full max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-2 text-center" style="color: var(--tg-theme-link-color, #0082c8)">🏛️ Схема кампуса СибГИУ</h1>
        <div class="flex gap-2 mb-3">
            <input id="search-input" type="text" placeholder="Поиск (например: 5, Столовая, Культурный)..." 
                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                   style="background: var(--tg-theme-secondary-bg-color, #f3f4f6); border-color: var(--tg-theme-hint-color, #ccc); color: var(--tg-theme-text-color, #000)">
            <button onclick="searchBuilding()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">Найти</button>
        </div>

        <div id="info-box" class="mb-3 p-3 rounded-lg text-sm hidden shadow-sm" style="background: var(--tg-theme-secondary-bg-color, #e5e7eb)">
            <div class="font-bold text-blue-700 text-base" id="info-title">Корпус</div>
            <div class="text-xs mt-1 text-gray-700 leading-relaxed" id="info-desc">Описание...</div>
            <div class="text-[10px] mt-1.5 text-red-500 font-semibold">* Переходы между учебными корпусами расположены на 2-ом этаже.</div>
        </div>
    </div>

    <div class="flex-grow w-full max-w-xl mx-auto flex items-center justify-center border rounded-xl p-2 shadow-inner bg-white overflow-hidden" style="border-color: var(--tg-theme-hint-color, #e5e7eb);">
        
        <div id="schema-view" class="w-full h-full flex items-center justify-center">
            <svg viewBox="0 0 500 540" class="w-full h-full max-h-[72vh]" xmlns="http://www.w3.org/2000/svg">
                
                <path d="M 170 325 L 212 375" stroke="#0082c8" stroke-width="9" stroke-linecap="square" fill="none" opacity="0.5" />
                <path d="M 170 325 L 212 375" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 3" fill="none" />
                
                <path id="build-1" class="building" d="M 205 375 H 235 V 430 H 275 V 375 H 305 V 475 H 205 Z" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(1)"/>
                <text x="255" y="455" fill="#fff" font-size="16" font-weight="bold" class="pointer-events-none" text-anchor="middle">1</text>

                <rect id="build-3" class="building" x="240" y="315" width="30" height="65" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(3)"/>
                <text x="255" y="350" fill="#fff" font-size="15" font-weight="bold" class="pointer-events-none" text-anchor="middle">3</text>

                <rect x="305" y="405" width="35" height="12" fill="#0082c8" opacity="0.6" />
                
                <rect id="build-2" class="building" x="340" y="390" width="85" height="42" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(2)"/>
                <text x="382" y="416" fill="#fff" font-size="15" font-weight="bold" class="pointer-events-none" text-anchor="middle">2</text>


                <g transform="translate(165, 245) rotate(-45)">
                    
                    <rect x="-140" y="-4" width="365" height="8" fill="#0082c8" opacity="0.4" />

                    <rect x="-190" y="-23" width="8" height="8" fill="#0082c8" />
                    <rect id="build-9" class="building" x="-185" y="-30" width="50" height="50" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(9)"/>
                    <text x="-160" y="0" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(45, -160, -4)">9</text>

                    <rect x="-135" y="-5" width="20" height="10" fill="#0082c8" opacity="0.7"/>

                    <rect x="-60" y="-19" width="10" height="6" fill="#0082c8" />
                    <rect id="build-5" class="building" x="-115" y="-13" width="145" height="26" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(5)"/>
                    <text x="-42" y="5" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(45, -42, 1)">5</text>

                    <line x1="30" y1="-13" x2="30" y2="13" stroke="#ffffff" stroke-width="2" />

                    <rect x="70" y="-19" width="10" height="6" fill="#0082c8" />
                    <rect x="150" y="-19" width="10" height="6" fill="#0082c8" />
                    <rect id="build-6" class="building" x="30" y="-13" width="195" height="26" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(6)"/>
                    <text x="127" y="5" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(45, 127, 1)">6</text>

                    <rect x="-50" y="13" width="22" height="14" fill="#0082c8" opacity="0.7"/>
                    <rect id="build-4" class="building" x="-65" y="27" width="55" height="55" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(4)"/>
                    <text x="-37" y="60" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(45, -37, 56)">4</text>

                    <rect x="55" y="13" width="16" height="14" fill="#0082c8" opacity="0.7"/>
                    <rect id="build-7" class="building" x="42" y="27" width="42" height="60" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(7)"/>
                    <text x="63" y="62" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(45, 63, 58)">7</text>

                    <rect id="build-8" class="building" x="115" y="42" width="32" height="75" fill="#0082c8" stroke="#0066a4" stroke-width="1.5" onclick="selectBuilding(8)"/>
                    <text x="131" y="85" fill="#fff" font-size="14" font-weight="bold" class="pointer-events-none" text-anchor="middle" transform="rotate(45, 131, 81)">8</text>
                </g>
            </svg>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const campusData = {
            1: { title: "1. Главный корпус", desc: "Ректорат, приемная комиссия, главный вход, бухгалтерия, библиотека, коворкинг и администрация университета." },
            2: { title: "2. Спорткомплекс", desc: "Спортивные залы, фитнес-зоны, кафедры физического воспитания, секции и проведение соревнований." },
            3: { title: "3. Столовая", desc: "Основной комбинат питания студентов, буфеты и обеденные зоны СибГИУ." },
            4: { title: "4. Блок поточных аудиторий", desc: "Большие лекционные амфитеатры для проведения потоковых занятий и общих лекций." },
            5: { title: "5. Металлургический корпус", desc: "Институт металлургии и материаловедения. Аудитории, научные лаборатории и учебные центры." },
            6: { title: "6. Горно-технологический корпус", desc: "Институт горного дела и геосистем, а также ИИТиАС (Информационные технологии и автоматизированные системы)." },
            7: { title: "7. Блок тяжелых лабораторий 1", desc: "Лабораторные стенды симуляции проката, физики металлов и термической обработки." },
            8: { title: "8. Блок тяжелых лабораторий 2", desc: "Исследовательские комплексы кафедр горного дела, геодезии и вентиляции шахт." },
            9: { title: "9. Культурный центр", desc: "Актовый зал, студенческий клуб, репетиционные залы, творческие студии, проведение концертов." }
        };

        function selectBuilding(id) {
            document.querySelectorAll('.building').forEach(b => b.classList.remove('highlighted'));
            
            const buildingEl = document.getElementById('build-' + id);
            if (buildingEl) buildingEl.classList.add('highlighted');

            const infoBox = document.getElementById('info-box');
            document.getElementById('info-title').innerText = campusData[id].title;
            document.getElementById('info-desc').innerText = campusData[id].desc;
            infoBox.classList.remove('hidden');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function searchBuilding() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (!query) return;

            let foundId = null;
            Object.keys(campusData).forEach(id => {
                if (id === query || campusData[id].title.toLowerCase().includes(query) || campusData[id].desc.toLowerCase().includes(query)) {
                    foundId = id;
                }
            });

            if (foundId) {
                selectBuilding(foundId);
            } else {
                alert("Объект не найден. Введите номер корпуса (1-9) или название.");
            }
        }
    </script>
</body>
</html>
